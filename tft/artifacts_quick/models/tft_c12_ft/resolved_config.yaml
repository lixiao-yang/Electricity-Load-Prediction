project:
  name: electricity-load-forecasting-tft
  seed: 42
paths:
  train_wide_path: data/train_hourly_preprocessed.parquet
  test_wide_path: data/test_hourly_preprocessed.parquet
  clusters_path: data/extended-clustering-high-cov/clusters_3models.parquet
  artifacts_root: tft/artifacts_quick
  data_output_dir: tft/artifacts_quick/data
  features_train_path: tft/artifacts_quick/data/features_train.parquet
  features_val_path: tft/artifacts_quick/data/features_val.parquet
  features_test_path: tft/artifacts_quick/data/features_test.parquet
  features_future_known_path: tft/artifacts_quick/data/features_future_known.parquet
  split_boundaries_path: tft/artifacts_quick/data/split_boundaries.json
  leakage_audit_path: tft/artifacts_quick/data/leakage_audit.json
  tft_dataset_meta_path: tft/artifacts_quick/data/tft_dataset_meta.json
  tft_dataset_parameters_path: tft/artifacts_quick/data/tft_dataset_parameters.pt
  shared_panel_path: tft/artifacts_quick/data/shared_panel.parquet
  cluster_10_panel_path: tft/artifacts_quick/data/cluster_10_panel.parquet
  cluster_12_panel_path: tft/artifacts_quick/data/cluster_12_panel.parquet
  models_dir: tft/artifacts_quick/models
  eval_dir: tft/artifacts_quick/eval
  infer_dir: tft/artifacts_quick/infer
  agent_bridge_dir: tft/artifacts_quick/agent_bridge
  dataloader_config_path: tft/configs/dataloader_quick.yaml
data:
  frequency: h
  cluster_ids:
  - 10
  - 12
  target_col: target_load
  user_col: user_id
  cluster_col: cluster_id
  time_col: timestamp
  train_months: 18
  val_months: 3
  test_months: 3
  future_horizon_days: 14
  holiday_calendar: us_federal
  cluster_label_col: cluster_kmeans
  target_lag_hours:
  - 24
  - 48
  - 168
  target_roll_windows:
  - 24
  - 168
  use_target_derived_covariates: false
  mape_epsilon: 1.0e-06
model:
  min_encoder_length: 72
  max_encoder_length: 168
  max_prediction_length: 24
  rolling_stride_hours: 168
  hidden_size: 16
  attention_head_size: 1
  dropout: 0.1
  hidden_continuous_size: 8
  learning_rate: 0.001
  batch_size: 16
  max_epochs: 1
  gradient_clip_val: 0.1
  early_stop_patience: 2
  reduce_on_plateau_patience: 1
  accelerator: auto
  devices: 1
  precision: 32
  num_workers: 0
  limit_train_batches: 0.05
  limit_val_batches: 0.1
  quantiles:
  - 0.1
  - 0.5
  - 0.9
run:
  name: tft_c12_ft_quick
  cluster_id: 12
  panel_path: tft/artifacts_quick/data/cluster_12_panel.parquet
  output_dir: tft/artifacts_quick/models/tft_c12_ft
  shared_dataset_params_path: tft/artifacts_quick/models/tft_shared_pretrain/dataset_params.pt
  pretrained_checkpoint_path: tft/artifacts_quick/models/tft_shared_pretrain/checkpoints/best.ckpt
