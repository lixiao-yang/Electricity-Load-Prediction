project:
  name: electricity-load-forecasting-tft
  seed: 42

paths:
  train_wide_path: data/train_hourly_preprocessed.parquet
  test_wide_path: data/test_hourly_preprocessed.parquet
  clusters_path: data/extended-clustering-high-cov/clusters_3models.parquet
  artifacts_root: tft/artifacts
  data_output_dir: tft/artifacts/data
  features_train_path: tft/artifacts/data/features_train.parquet
  features_val_path: tft/artifacts/data/features_val.parquet
  features_test_path: tft/artifacts/data/features_test.parquet
  features_future_known_path: tft/artifacts/data/features_future_known.parquet
  split_boundaries_path: tft/artifacts/data/split_boundaries.json
  leakage_audit_path: tft/artifacts/data/leakage_audit.json
  tft_dataset_meta_path: tft/artifacts/data/tft_dataset_meta.json
  tft_dataset_parameters_path: tft/artifacts/data/tft_dataset_parameters.pt
  shared_panel_path: tft/artifacts/data/shared_panel.parquet
  cluster_10_panel_path: tft/artifacts/data/cluster_10_panel.parquet
  cluster_12_panel_path: tft/artifacts/data/cluster_12_panel.parquet
  models_dir: tft/artifacts/models
  eval_dir: tft/artifacts/eval
  infer_dir: tft/artifacts/infer
  agent_bridge_dir: tft/artifacts/agent_bridge
  dataloader_config_path: tft/configs/dataloader.yaml

data:
  frequency: h
  cluster_ids: [10, 12]
  target_col: target_load
  user_col: user_id
  cluster_col: cluster_id
  time_col: timestamp
  train_months: 18
  val_months: 3
  test_months: 3
  future_horizon_days: 14
  holiday_calendar: us_federal
  cluster_label_col: cluster_kmeans
  target_lag_hours: [24, 48, 168]
  target_roll_windows: [24, 168]
  use_target_derived_covariates: false
  mape_epsilon: 1.0e-6

model:
  min_encoder_length: 168
  max_encoder_length: 672
  max_prediction_length: 336
  rolling_stride_hours: 24
  hidden_size: 48
  attention_head_size: 4
  dropout: 0.15
  hidden_continuous_size: 24
  learning_rate: 0.0006
  warmup_steps: 400
  warmup_init_factor: 0.2
  # Balanced 7-hour budget profile for local RTX 5070.
  # OOM fallback for shared pretrain: 40 -> 32 -> 24
  batch_size: 40
  max_epochs: 24
  gradient_clip_val: 0.1
  early_stop_patience: 5
  reduce_on_plateau_patience: 3
  accelerator: gpu
  devices: 1
  precision: 16-mixed
  # Windows + local RTX 5070 default. If worker startup is unstable, drop back to 4.
  num_workers: 8
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  num_sanity_val_steps: 0
  log_every_n_steps: 50
  quantiles: [0.1, 0.5, 0.9]
